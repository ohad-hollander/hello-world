<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Space Invaders</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      touch-action: none;
    }
    canvas {
      display: block;
    }
    #controls {
      display: none;
    }
    @media (pointer: coarse) {
      #controls {
        display: flex;
        width: 100%;
        max-width: 672px;
        gap: 8px;
        padding: 8px;
        flex-shrink: 0;
      }
      #controls button {
        flex: 1;
        height: 70px;
        background: rgba(0, 255, 0, 0.15);
        border: 2px solid rgba(0, 255, 0, 0.6);
        color: #0f0;
        font-size: 28px;
        border-radius: 10px;
        -webkit-tap-highlight-color: transparent;
        touch-action: none;
        user-select: none;
        cursor: pointer;
      }
      #controls button:active {
        background: rgba(0, 255, 0, 0.35);
      }
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="controls">
    <button id="btn-left">◀</button>
    <button id="btn-fire">▲ FIRE</button>
    <button id="btn-right">▶</button>
  </div>

  <!-- Load order matters: constants first, then modules, then game orchestrator -->
  <script src="js/constants.js"></script>
  <script src="js/sound.js"></script>
  <script src="js/input.js"></script>
  <script src="js/player.js"></script>
  <script src="js/aliens.js"></script>
  <script src="js/bullets.js"></script>
  <script src="js/shields.js"></script>
  <script src="js/ufo.js"></script>
  <script src="js/hud.js"></script>
  <script src="js/game.js"></script>

  <script>
    // --- Canvas Setup ---
    const canvas = document.getElementById('canvas');
    const dpr = window.devicePixelRatio || 1;
    canvas.width  = LOGICAL_WIDTH  * dpr;
    canvas.height = LOGICAL_HEIGHT * dpr;

    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);

    // Scale canvas CSS size to fit the viewport (mobile-friendly)
    function resizeCanvas() {
      const controls = document.getElementById('controls');
      const controlsH = controls.offsetHeight;
      const availW = window.innerWidth;
      const availH = window.innerHeight - controlsH;
      const scale = Math.min(availW / LOGICAL_WIDTH, availH / LOGICAL_HEIGHT);
      canvas.style.width  = Math.floor(LOGICAL_WIDTH  * scale) + 'px';
      canvas.style.height = Math.floor(LOGICAL_HEIGHT * scale) + 'px';
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // --- Touch Controls ---
    function bindButton(id, keyCode) {
      const el = document.getElementById(id);
      if (!el) return;
      el.addEventListener('touchstart', e => { e.preventDefault(); keys[keyCode] = true; },  { passive: false });
      el.addEventListener('touchend',   e => { e.preventDefault(); keys[keyCode] = false; }, { passive: false });
      el.addEventListener('touchcancel',e => { e.preventDefault(); keys[keyCode] = false; }, { passive: false });
    }
    bindButton('btn-left',  'ArrowLeft');
    bindButton('btn-right', 'ArrowRight');
    bindButton('btn-fire',  'Space');

    // --- Fixed-Timestep Game Loop ---
    let accumulator = 0;
    let lastTime    = null;

    function loop(timestamp) {
      if (lastTime === null) lastTime = timestamp;
      let dt = (timestamp - lastTime) / 1000;
      lastTime = timestamp;
      if (dt > 0.25) dt = 0.25; // clamp: spiral-of-death prevention

      accumulator += dt;
      while (accumulator >= FIXED_STEP) {
        update(FIXED_STEP);
        accumulator -= FIXED_STEP;
      }

      render();
      requestAnimationFrame(loop);
    }

    // Initialize and start
    initGame();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
