<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Space Invaders</title>
  <style>
    body {
      margin: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <!-- Load order matters: constants first, then modules, then game orchestrator -->
  <script src="js/constants.js"></script>
  <script src="js/input.js"></script>
  <script src="js/player.js"></script>
  <script src="js/aliens.js"></script>
  <script src="js/bullets.js"></script>
  <script src="js/shields.js"></script>
  <script src="js/hud.js"></script>
  <script src="js/game.js"></script>

  <script>
    // --- Canvas Setup (stays in index.html as shell entry point) ---
    const canvas = document.getElementById('canvas');
    const dpr = window.devicePixelRatio || 1;
    canvas.style.width  = LOGICAL_WIDTH  + 'px';
    canvas.style.height = LOGICAL_HEIGHT + 'px';
    canvas.width  = LOGICAL_WIDTH  * dpr;
    canvas.height = LOGICAL_HEIGHT * dpr;

    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);

    // --- Fixed-Timestep Game Loop (stays in index.html) ---
    let accumulator = 0;
    let lastTime    = null;

    function loop(timestamp) {
      if (lastTime === null) lastTime = timestamp;
      let dt = (timestamp - lastTime) / 1000;
      lastTime = timestamp;
      if (dt > 0.25) dt = 0.25; // clamp: spiral-of-death prevention

      accumulator += dt;
      while (accumulator >= FIXED_STEP) {
        update(FIXED_STEP);
        accumulator -= FIXED_STEP;
      }

      render();
      requestAnimationFrame(loop);
    }

    // Initialize and start
    initGame();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
