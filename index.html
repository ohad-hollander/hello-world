<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Space Invaders</title>
  <style>
    body {
      margin: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <script>
    // --- Canvas Setup ---
    const canvas = document.getElementById('canvas');

    // Logical size: 672x768 (224 x 256 x 3 — 3x classic arcade resolution)
    const LOGICAL_WIDTH = 672;
    const LOGICAL_HEIGHT = 768;

    // HiDPI / devicePixelRatio scaling for sharp rendering
    const dpr = window.devicePixelRatio || 1;
    canvas.style.width = LOGICAL_WIDTH + 'px';
    canvas.style.height = LOGICAL_HEIGHT + 'px';
    canvas.width = LOGICAL_WIDTH * dpr;
    canvas.height = LOGICAL_HEIGHT * dpr;

    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);

    // --- Input System (FOUND-03) ---
    const keys = {};
    window.addEventListener('keydown', e => {
      keys[e.code] = true;
      if (e.code === 'Space') e.preventDefault(); // prevent page scroll
    });
    window.addEventListener('keyup', e => {
      keys[e.code] = false;
    });

    // --- Fixed-Timestep Game Loop (FOUND-01) ---
    const FIXED_STEP = 1 / 60;   // 60 Hz update rate
    let accumulator = 0;
    let lastTime = null;
    let frameCount = 0;
    let fpsTimer = 0;

    function update(dt) {
      // Phase 1: no entities yet — loop proof only
    }

    function render() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, LOGICAL_WIDTH, LOGICAL_HEIGHT);
      // Placeholder rect — centered near (316, 380) — removed in Phase 2
      ctx.fillStyle = '#0f0';
      ctx.fillRect(316, 380, 40, 40);
    }

    function loop(timestamp) {
      if (lastTime === null) lastTime = timestamp;
      let dt = (timestamp - lastTime) / 1000;
      lastTime = timestamp;

      // Clamp dt to 0.25s — prevents spiral of death on tab switch
      if (dt > 0.25) dt = 0.25;

      accumulator += dt;
      while (accumulator >= FIXED_STEP) {
        update(FIXED_STEP);
        accumulator -= FIXED_STEP;
      }

      render();

      frameCount++;
      fpsTimer += dt;
      if (fpsTimer >= 1.0) {
        console.log('FPS: ' + frameCount + ' | keys:', JSON.stringify(keys));
        frameCount = 0;
        fpsTimer = 0;
      }

      requestAnimationFrame(loop);
    }

    requestAnimationFrame(loop);
  </script>
</body>
</html>
